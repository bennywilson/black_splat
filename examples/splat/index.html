<!DOCTYPE html>

<meta name="author" content="Benny Wilson">
<title>Black Splat - Gaussian Splats</title>
<style>
	body, html {
		margin: 0;
		padding: 0;
		width: 100%;
		height: 100%;
		overflow: hidden;
	}
	canvas {
		display: block;
		width: 100%;
		height: 100%;
	}
</style>

<!-- All GUI (buttons, sliders, touch pads) is egui, rendered in-engine on the
     canvas -- the page is just a host for the wasm module. -->

<script type="module">
	import init, * as bsApp from "./black_splat_splat_demo.js";

	// MuJoCo (MujocoActor, see src/mujoco.rs) is a second, independent wasm
	// module with its own linear memory and its own requestAnimationFrame
	// loop; it hands geom snapshots to the Rust side via the mj_bridge_*
	// wasm-bindgen exports, matching examples/mujoco_test/index.html. Unlike
	// that fixed single-scene example, the editor can add/retarget a
	// MujocoActor's XML path at any time, so this polls for the *current*
	// model text each frame and reloads whenever it changes, rather than
	// loading once at boot. Only the most recently loaded MJCF actually
	// simulates -- src/mujoco.rs's wasm bridge is a single global sim, a
	// known limitation for scenes with multiple simultaneous MujocoActors.
	async function startMujocoBridge() {
		let mujoco = null;
		let model = null;
		let data = null;
		let lastXml = "";
		let geomType, geomSize, geomRgba;
		let accumulator = 0;
		let lastTime = performance.now();
		const SIM_TIMESTEP = 0.005;
		const MAX_STEPS_PER_FRAME = 8;

		function loadModel(xml) {
			if (model) {
				model.delete();
				data.delete();
			}
			model = mujoco.MjModel.from_xml_string(xml);
			data = new mujoco.MjData(model);
			geomType = new Uint32Array(model.geom_type);
			geomSize = new Float32Array(model.geom_size);
			geomRgba = new Float32Array(model.geom_rgba);
			accumulator = 0;

			for (const name of bsApp.mj_bridge_watched_geom_names()) {
				const geom = model.geom(name);
				bsApp.mj_bridge_report_geom_id(name, geom.id);
				geom.delete();
			}
			for (const name of bsApp.mj_bridge_watched_joint_names()) {
				const joint = model.jnt(name);
				bsApp.mj_bridge_report_joint_dof(name, joint.dofadr);
				joint.delete();
			}
		}

		window.__bsMujocoApplyQvel = (dofIndex, amount) => {
			if (data) data.qvel[dofIndex] += amount;
		};

		function frame(now) {
			const xml = bsApp.mj_bridge_model_xml();
			if (xml && xml !== lastXml) {
				lastXml = xml;
				try {
					loadModel(xml);
				} catch (err) {
					console.error("MuJoCo bridge: failed to load MJCF:", err);
				}
			}

			if (model) {
				if (bsApp.mj_bridge_take_reset_requested()) {
					mujoco.mj_resetData(model, data);
					accumulator = 0;
				}

				const dt = Math.min((now - lastTime) / 1000, 0.1);
				if (bsApp.mj_bridge_playing()) {
					accumulator += dt * bsApp.mj_bridge_speed();
				}

				let steps = 0;
				while (accumulator >= SIM_TIMESTEP && steps < MAX_STEPS_PER_FRAME) {
					mujoco.mj_step(model, data);
					accumulator -= SIM_TIMESTEP;
					steps++;
				}
				if (bsApp.mj_bridge_take_single_step_requested()) {
					mujoco.mj_step(model, data);
				}

				bsApp.mj_bridge_set_geoms(
					geomType,
					geomSize,
					geomRgba,
					new Float32Array(data.geom_xpos),
					new Float32Array(data.geom_xmat),
				);
			}

			lastTime = now;
			requestAnimationFrame(frame);
		}

		// Loading the MuJoCo wasm module itself is deferred until a
		// MujocoActor actually exists (mj_bridge_model_xml() non-empty), so
		// scenes without one don't pay for it.
		async function waitForFirstModel() {
			for (;;) {
				if (bsApp.mj_bridge_model_xml()) return;
				await new Promise((r) => setTimeout(r, 250));
			}
		}
		await waitForFirstModel();
		const loadMujoco = (await import("./mujoco_web/mujoco.js")).default;
		mujoco = await loadMujoco();
		requestAnimationFrame(frame);
	}

	function viewportSize() {
		// visualViewport reflects the actual visible area on mobile (accounts
		// for the URL bar sliding in/out and pinch-zoom); fall back to the
		// window inner size where it isn't available.
		const vv = window.visualViewport;
		return {
			width: vv ? vv.width : window.innerWidth,
			height: vv ? vv.height : window.innerHeight,
		};
	}

	function resizeCanvas() {
		const canvas = document.getElementById("target");
		if (!canvas) return;
		const dpr = window.devicePixelRatio || 1;
		const { width, height } = viewportSize();
		// Always size the drawing buffer as a landscape (wide) view: the longer
		// viewport edge is the width, the shorter is the height. Because
		// rotating a device just swaps its two viewport dimensions, max/min
		// yields the same buffer size in portrait and landscape -- so rotation
		// no longer re-lays-out the scene or leaves it not fitting. The app is
		// meant to be used in landscape; held in actual portrait the view is
		// stretched by the canvas's 100%/100% CSS.
		const long = Math.max(width, height);
		const short = Math.min(width, height);
		canvas.width = Math.round(long * dpr);
		canvas.height = Math.round(short * dpr);
		console.log(`Canvas resized to ${canvas.width}x${canvas.height}`);
	}

    // Resize canvas immediately when DOM is ready
	function initCanvas() {
		const canvas = document.getElementById("target");
		if (canvas) {
			resizeCanvas();
		}
	}

	if (document.readyState === "loading") {
		document.addEventListener("DOMContentLoaded", initCanvas);
	} else {
		initCanvas();
	}

    window.addEventListener("load", () => {
        // Cache-bust the wasm URL so Chrome's compiled-wasm cache can't serve a
        // stale build across rebuilds (a plain reload otherwise reuses it).
        init({
            module_or_path: new URL(
                `./black_splat_splat_demo_bg.wasm?v=${Date.now()}`,
                import.meta.url
            ),
        }).then(() => {
            startMujocoBridge().catch((err) =>
                console.error("MuJoCo bridge failed to start:", err)
            );
        });
    });

    // Handle window resize events. We no longer special-case orientation
    // changes: the landscape-assumed buffer size is the same before and after
    // a rotation, so a plain resize/visualViewport listener is enough (and
    // catches genuine size changes like the mobile URL bar reflowing).
    window.addEventListener("resize", resizeCanvas);
    if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", resizeCanvas);
    }
</script>

<canvas id="target"></canvas>
